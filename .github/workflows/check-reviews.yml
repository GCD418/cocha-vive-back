name: Check-Reviews
on:
  pull_request_review:
    types: [submitted, dismissed]
  pull_request:
    types: [opened, synchronized, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review-counter:
    runs-on: ubuntu-slim
    steps:
      - name: Verify approvals
        uses: actions/github-script@v6
        with:
          script: |
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const approvals = reviews.data.filter(r => r.state === 'APPROVED');

            const hasCollab = approvals.some(r =>
              r.author_association === 'MEMBER' || r.author_association === 'OWNER' || r.author_association === 'COLLABORATOR'
            );

            const uniqueApprovers = new Set(approvals.map(r => r.user.login));
            const totalApprovals = uniqueApprovers.size;

            let summary = `### 🔍 Review Status Report\n`;
            summary += `| Requirement | Status | Details |\n`;
            summary += `| :--- | :---: | :--- |\n`;
            summary += `| **Team Collaborator** | ${hasCollab ? '✅' : '⏳'} | ${hasCollab ? 'The board approves IT' : 'Waiting for team member'} |\n`;
            summary += `| **Total Approvals** | ${totalApprovals >= 2 ? '✅' : '⏳'} | ${totalApprovals}/2 reviews received |\n\n`;

            if (totalApprovals > 0) {
              summary += `**Current Reviewers:** ${uniqueApprovers.join(', ')}`;
            }

            await core.summary.addRaw(summary).write();

            console.log(`Approved collaborator: ${hasCollab}`);
            console.log(`Unique approvals total: ${totalApprovals}`);

            if (hasCollab && totalApprovals >= 2) {
              console.log("AWESOME, squash is coming");
            } else {
              core.setFailed("Get to work and approve the PR!!!");
            }

spring:
  application:
    name: CochaVive
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_LINK}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:3}
      minimum-idle: ${HIKARI_MIN_IDLE:1}

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  jpa:
    show-sql: ${JPA_SHOW_SQL:false}
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
        generate_statistics: ${HIBERNATE_GENERATE_STATISTICS:false}

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}

  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration-time: ${JWT_EXPIRATION_TIME}

    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_ADDRESS}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

logging:
  level:
    cocha:
      vive:
        backend: ${APP_LOG_LEVEL:INFO}
    "org.hibernate.SQL": ${HIBERNATE_SQL_LOG_LEVEL:WARN}
    "org.hibernate.orm.jdbc.bind": ${HIBERNATE_BIND_LOG_LEVEL:WARN}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,https://cocha-vive.netlify.app}
  email:
    from: "CochaVive manager <${GMAIL_ADDRESS}>"

unleash:
  app-name: cocha-vive-unleash
  instance-id: unleash-onboarding-instance
  api-url: https://primary-production-0ced61.up.railway.app/api/
  api-token: ${UNLEASH_API_TOKEN}
  environment: production
  fetch-toggles-interval: 15

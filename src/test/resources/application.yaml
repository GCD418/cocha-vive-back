spring:
  datasource:
    url: jdbc:h2:mem:cochavive_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  cloudinary:
    cloud-name: test-cloud
    api-key: test-key
    api-secret: test-secret

  security:
    jwt:
      secret-key: dGVzdHRlc3R0ZXN0dGVzdHRlc3R0ZXN0dGVzdHRlc3Q=
      expiration-time: 3600000
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id

cloudinary:
  cloud-name: test-cloud
  api-key: test-key
  api-secret: test-secret
